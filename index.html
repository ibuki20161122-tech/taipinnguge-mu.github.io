<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レジ POS システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --danger: #ff4757;
    --warn: #ffa502;
    --text: #e8f4fd;
    --text2: #8ba4c0;
    --border: rgba(0,212,255,0.2);
    --glow: 0 0 20px rgba(0,212,255,0.3);
    --glow2: 0 0 20px rgba(0,255,157,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  .header {
    position: relative;
    z-index: 10;
    background: linear-gradient(135deg, #0d1b2e, #111827);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }

  .header-logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(14px, 1.6vw, 22px);
    letter-spacing: clamp(2px, 0.4vw, 4px);
    color: var(--accent);
    text-shadow: var(--glow);
  }

  .header-logo span { color: var(--accent2); }

  .header-info {
    display: flex;
    gap: 20px;
    align-items: center;
    font-size: clamp(10px, 1.1vw, 13px);
    color: var(--text2);
  }

  .clock {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  /* Main layout */
  .main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: grid;
    grid-template-columns: 1fr clamp(280px, 28vw, 420px);
    gap: 12px;
    padding: 12px;
    overflow: hidden;
    height: calc(100dvh - 58px);
  }

  /* Left panel */
  .left-panel {
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow: hidden;
  }

  /* Product list */
  .cart-section {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    box-shadow: var(--glow);
  }

  .section-header {
    padding: 10px 16px;
    background: linear-gradient(90deg, rgba(0,212,255,0.1), transparent);
    border-bottom: 1px solid var(--border);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-header::before {
    content: '';
    width: 4px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
    box-shadow: var(--glow);
  }

  .cart-table-wrap { flex: 1; overflow-y: auto; }

  .cart-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .cart-table th {
    position: sticky;
    top: 0;
    background: var(--surface2);
    padding: 8px 12px;
    text-align: left;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text2);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    z-index: 2;
  }

  .cart-table td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }

  .cart-table tr:hover td { background: rgba(0,212,255,0.04); }

  .item-name {
    font-weight: 500;
    color: var(--text);
  }

  .item-code {
    font-size: 10px;
    color: var(--text2);
    font-family: monospace;
  }

  .qty-ctrl {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .qty-btn {
    width: 26px;
    height: 26px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--accent);
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .qty-btn:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: var(--glow);
  }

  .qty-num {
    width: 32px;
    text-align: center;
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    color: var(--text);
  }

  .price-cell {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: var(--accent2);
    text-align: right;
    white-space: nowrap;
  }

  .del-btn {
    width: 28px;
    height: 28px;
    border: 1px solid rgba(255,71,87,0.3);
    background: transparent;
    color: var(--danger);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .del-btn:hover {
    background: var(--danger);
    color: white;
    box-shadow: 0 0 12px rgba(255,71,87,0.4);
  }

  .empty-cart {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    font-size: 13px;
    gap: 10px;
    padding: 40px;
  }

  .empty-cart .icon { font-size: 48px; opacity: 0.3; }

  /* Barcode input area */
  .scan-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .scan-input-wrap {
    flex: 1;
    position: relative;
  }

  .scan-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    color: var(--accent);
  }

  .scan-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    padding: 10px 12px 10px 40px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 2px;
  }

  .scan-input:focus {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  .scan-input::placeholder {
    color: var(--text2);
    font-size: 12px;
    letter-spacing: 1px;
  }

  .cam-btn {
    padding: 10px 16px;
    background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(0,212,255,0.05));
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .cam-btn:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: var(--glow);
  }

  .cam-btn.active {
    background: var(--accent);
    color: var(--bg);
    box-shadow: var(--glow);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: var(--glow); }
    50% { box-shadow: 0 0 30px rgba(0,212,255,0.6); }
  }

  /* Right panel */
  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--glow);
  }

  .summary-rows { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--text2);
  }

  .summary-row .val {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    color: var(--text);
  }

  .summary-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  .total-row {
    padding: 14px 16px;
    background: linear-gradient(135deg, rgba(0,255,157,0.1), rgba(0,212,255,0.05));
    border-top: 1px solid rgba(0,255,157,0.3);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .total-label {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--accent2);
  }

  .total-amount {
    font-family: 'Orbitron', monospace;
    font-size: clamp(18px, 2.2vw, 30px);
    color: var(--accent2);
    text-shadow: var(--glow2);
  }

  /* Payment section */
  .payment-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .payment-input-wrap {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .payment-label {
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 1px;
  }

  .payment-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--accent2);
    font-family: 'Orbitron', monospace;
    font-size: clamp(16px, 1.8vw, 24px);
    padding: clamp(6px, 0.8vh, 12px) 14px;
    outline: none;
    text-align: right;
    transition: border-color 0.2s;
  }

  .payment-input:focus {
    border-color: var(--accent2);
    box-shadow: var(--glow2);
  }

  .change-display {
    padding: 10px 16px;
    background: rgba(0,255,157,0.05);
    border-top: 1px solid rgba(0,255,157,0.15);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .change-label { font-size: 12px; color: var(--text2); }

  .change-val {
    font-family: 'Orbitron', monospace;
    font-size: clamp(14px, 1.6vw, 22px);
    color: var(--accent2);
  }

  .change-val.negative { color: var(--danger); }

  /* Numpad */
  .numpad {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .num-btn {
    padding: clamp(6px, 1.2vh, 14px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
    font-size: clamp(13px, 1.4vw, 20px);
    font-family: 'Orbitron', monospace;
    transition: all 0.15s;
    text-align: center;
  }

  .num-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: var(--glow);
  }

  .num-btn:active { transform: scale(0.95); }

  .num-btn.wide { grid-column: span 2; }

  .num-btn.clear {
    border-color: rgba(255,71,87,0.3);
    color: var(--danger);
  }

  .num-btn.clear:hover {
    background: var(--danger);
    color: white;
    border-color: var(--danger);
    box-shadow: 0 0 12px rgba(255,71,87,0.4);
  }

  /* Checkout button */
  .checkout-btn {
    width: 100%;
    padding: clamp(10px, 1.5vh, 20px);
    background: linear-gradient(135deg, #00d4ff, #00ff9d);
    border: none;
    border-radius: 12px;
    color: var(--bg);
    font-family: 'Orbitron', monospace;
    font-size: clamp(12px, 1.3vw, 18px);
    font-weight: 900;
    letter-spacing: clamp(1px, 0.3vw, 3px);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(0,212,255,0.4);
  }

  .checkout-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,212,255,0.6);
  }

  .checkout-btn:active { transform: translateY(0); }

  .checkout-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .clear-all-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid rgba(255,71,87,0.3);
    border-radius: 8px;
    color: var(--danger);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .clear-all-btn:hover {
    background: rgba(255,71,87,0.1);
    border-color: var(--danger);
  }

  /* Camera modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }

  .modal-overlay.active { display: flex; }

  .camera-modal {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 20px;
    width: 460px;
    box-shadow: var(--glow), 0 20px 60px rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 20px;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
  }

  .modal-close:hover { color: var(--danger); }

  #camera-container {
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--border);
  }

  #camera-container video {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
  }

  .scan-line {
    position: absolute;
    left: 10%;
    right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    top: 30%;
    animation: scanline 2s ease-in-out infinite;
    box-shadow: 0 0 10px var(--accent);
  }

  @keyframes scanline {
    0%, 100% { top: 20%; opacity: 1; }
    50% { top: 80%; opacity: 0.7; }
  }

  .scan-frame {
    position: absolute;
    inset: 20%;
    border: 2px solid rgba(0,212,255,0.6);
    border-radius: 4px;
  }

  .scan-frame::before, .scan-frame::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--accent);
    border-style: solid;
  }

  .scan-frame::before {
    top: -2px;
    left: -2px;
    border-width: 3px 0 0 3px;
  }

  .scan-frame::after {
    bottom: -2px;
    right: -2px;
    border-width: 0 3px 3px 0;
  }

  .scan-status {
    text-align: center;
    font-size: 12px;
    color: var(--text2);
    padding: 6px;
    background: var(--surface2);
    border-radius: 8px;
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scan-status.detected {
    color: var(--accent2);
    background: rgba(0,255,157,0.1);
    border: 1px solid rgba(0,255,157,0.3);
  }

  /* OK modal */
  .ok-modal {
    background: var(--surface);
    border: 2px solid var(--accent2);
    border-radius: 20px;
    padding: 40px;
    width: 360px;
    text-align: center;
    box-shadow: var(--glow2), 0 20px 60px rgba(0,0,0,0.8);
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .ok-icon {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    margin: 0 auto 20px;
    box-shadow: var(--glow2);
    animation: spin-in 0.5s ease;
  }

  @keyframes spin-in {
    from { transform: rotate(-180deg) scale(0); }
    to { transform: rotate(0) scale(1); }
  }

  .ok-title {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    color: var(--accent2);
    letter-spacing: 4px;
    text-shadow: var(--glow2);
    margin-bottom: 8px;
  }

  .ok-subtitle { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

  .ok-detail {
    background: var(--surface2);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .ok-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
  }

  .ok-row .ok-label { color: var(--text2); }

  .ok-row .ok-val {
    font-family: 'Orbitron', monospace;
    color: var(--text);
  }

  .ok-row.highlight .ok-val { color: var(--accent2); font-size: 16px; }

  .ok-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #00d4ff, #00ff9d);
    border: none;
    border-radius: 10px;
    color: var(--bg);
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .ok-btn:hover {
    transform: translateY(-2px);
    box-shadow: var(--glow2);
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 70px;
    right: 20px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--text);
    z-index: 200;
    animation: slideIn 0.3s ease;
    box-shadow: var(--glow);
    max-width: 280px;
  }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .toast.error { border-color: var(--danger); box-shadow: 0 0 15px rgba(255,71,87,0.3); }
  .toast.success { border-color: var(--accent2); box-shadow: var(--glow2); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    .main {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr auto;
      height: auto;
      overflow-y: auto;
    }
    body { overflow-y: auto; height: auto; }
    .left-panel { min-height: 50vh; }
    .right-panel { flex-direction: row; flex-wrap: wrap; }
    .summary-card, .payment-card { flex: 1 1 200px; }
    .numpad { flex: 0 0 100%; }
    .checkout-btn, .clear-all-btn { flex: 1 1 45%; }
  }

  @media (max-width: 600px) {
    .header { padding: 8px 12px; }
    .header-info span:not(.clock) { display: none; }
    .main { padding: 8px; gap: 8px; }
    .right-panel { flex-direction: column; }
  }

</style>
</head>
<body>

<div class="header">
  <div class="header-logo">POS<span>NEXUS</span></div>
  <div class="header-info">
    <span>レジ #001</span>
    <span>担当: オペレーター</span>
    <span class="clock" id="clock">--:--:--</span>
  </div>
</div>

<div class="main">
  <!-- Left Panel -->
  <div class="left-panel">
    <div class="cart-section">
      <div class="section-header">カート / CART</div>
      <div class="cart-table-wrap" id="cart-wrap">
        <div class="empty-cart" id="empty-msg">
          <div class="icon">🛒</div>
          <div>商品をスキャンしてください</div>
        </div>
        <table class="cart-table" id="cart-table" style="display:none;">
          <thead>
            <tr>
              <th>商品名</th>
              <th>数量</th>
              <th>単価</th>
              <th>小計</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="cart-body"></tbody>
        </table>
      </div>
    </div>

    <div class="scan-area">
      <div class="scan-input-wrap">
        <span class="scan-icon">⚡</span>
        <input class="scan-input" id="barcode-input" type="text"
          placeholder="バーコードをスキャン / 入力して Enter"
          autofocus autocomplete="off">
      </div>
      <button class="cam-btn" id="cam-btn" onclick="toggleCamera()">
        📷 カメラ
      </button>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="summary-card">
      <div class="section-header">会計 / PAYMENT</div>
      <div class="summary-rows">
        <div class="summary-row">
          <span>小計</span>
          <span class="val" id="subtotal">¥0</span>
        </div>
        <div class="summary-row">
          <span>消費税 (10%)</span>
          <span class="val" id="tax">¥0</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-row">
          <span>点数</span>
          <span class="val" id="item-count">0点</span>
        </div>
      </div>
      <div class="total-row">
        <span class="total-label">合計</span>
        <span class="total-amount" id="total">¥0</span>
      </div>
    </div>

    <div class="payment-card">
      <div class="payment-input-wrap">
        <span class="payment-label">お預かり金額</span>
        <input class="payment-input" id="payment-input" type="text"
          placeholder="0" readonly>
      </div>
      <div class="change-display">
        <span class="change-label">お釣り</span>
        <span class="change-val" id="change">¥0</span>
      </div>
    </div>

    <div class="numpad" id="numpad">
      <button class="num-btn" onclick="numpad('7')">7</button>
      <button class="num-btn" onclick="numpad('8')">8</button>
      <button class="num-btn" onclick="numpad('9')">9</button>
      <button class="num-btn" onclick="numpad('4')">4</button>
      <button class="num-btn" onclick="numpad('5')">5</button>
      <button class="num-btn" onclick="numpad('6')">6</button>
      <button class="num-btn" onclick="numpad('1')">1</button>
      <button class="num-btn" onclick="numpad('2')">2</button>
      <button class="num-btn" onclick="numpad('3')">3</button>
      <button class="num-btn clear" onclick="numpad('C')">C</button>
      <button class="num-btn wide" onclick="numpad('0')">0</button>
    </div>

    <button class="checkout-btn" id="checkout-btn" onclick="checkout()" disabled>
      会計 ▶ CHECKOUT
    </button>
    <button class="clear-all-btn" onclick="clearAll()">🗑️ リセット</button>
  </div>
</div>

<!-- Camera Modal -->
<div class="modal-overlay" id="camera-modal">
  <div class="camera-modal">
    <div class="modal-title">
      <span>📷 バーコードスキャン</span>
      <button class="modal-close" onclick="closeCamera()">✕</button>
    </div>
    <div id="camera-container">
      <div class="scan-line"></div>
      <div class="scan-frame"></div>
    </div>
    <div class="scan-status" id="scan-status">カメラを起動中...</div>
  </div>
</div>

<!-- OK Modal -->
<div class="modal-overlay" id="ok-modal">
  <div class="ok-modal">
    <div class="ok-icon">✓</div>
    <div class="ok-title">OK!</div>
    <div class="ok-subtitle">会計が完了しました</div>
    <div class="ok-detail">
      <div class="ok-row highlight">
        <span class="ok-label">合計金額</span>
        <span class="ok-val" id="ok-total"></span>
      </div>
      <div class="ok-row">
        <span class="ok-label">お預かり</span>
        <span class="ok-val" id="ok-payment"></span>
      </div>
      <div class="ok-row highlight">
        <span class="ok-label">お釣り</span>
        <span class="ok-val" id="ok-change"></span>
      </div>
    </div>
    <button class="ok-btn" onclick="nextCustomer()">次のお客様 ▶</button>
  </div>
</div>

<script>
// ========== PRODUCT DATABASE ==========
const PRODUCTS = {
  '4901085616888': { name: 'コカ・コーラ 500ml', price: 160 },
  '4902102072458': { name: 'お~いお茶 緑茶 600ml', price: 140 },
  '4548779196283': { name: 'ポテトチップス うすしお', price: 148 },
  '4901201123573': { name: 'チョコレートアイス', price: 230 },
  '4901085624784': { name: 'ミネラルウォーター 2L', price: 98 },
  '4902102053563': { name: '抹茶ラテ 250ml', price: 130 },
  '4549741101069': { name: 'おにぎり 梅', price: 148 },
  '4901085618479': { name: 'カップヌードル', price: 230 },
  '4549741150042': { name: 'サンドイッチ ハム', price: 298 },
  '4902430359597': { name: 'ガム クールミント', price: 150 },
  '0049000028911': { name: 'Coca-Cola Classic', price: 180 },
  '5449000000996': { name: 'Sprite 330ml', price: 160 },
  // Demo barcodes
  '123456789012': { name: 'サンプル商品A', price: 100 },
  '234567890123': { name: 'サンプル商品B', price: 200 },
  '345678901234': { name: 'サンプル商品C', price: 300 },
};

// ========== STATE ==========
let cart = [];
let paymentAmount = '';
let cameraActive = false;

// ========== CLOCK ==========
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('ja-JP');
}
setInterval(updateClock, 1000);
updateClock();

// ========== CART ==========
function addProduct(barcode) {
  barcode = barcode.trim();
  if (!barcode) return;

  const product = PRODUCTS[barcode];
  if (!product) {
    showToast(`商品が見つかりません: ${barcode}`, 'error');
    return;
  }

  const existing = cart.find(i => i.barcode === barcode);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({ barcode, ...product, qty: 1 });
  }
  renderCart();
  showToast(`追加: ${product.name}`, 'success');
}

function changeQty(barcode, delta) {
  const item = cart.find(i => i.barcode === barcode);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(i => i.barcode !== barcode);
  renderCart();
}

function removeItem(barcode) {
  cart = cart.filter(i => i.barcode !== barcode);
  renderCart();
}

function clearAll() {
  cart = [];
  paymentAmount = '';
  document.getElementById('payment-input').value = '';
  renderCart();
  updateChange();
}

function renderCart() {
  const body = document.getElementById('cart-body');
  const table = document.getElementById('cart-table');
  const emptyMsg = document.getElementById('empty-msg');

  if (cart.length === 0) {
    table.style.display = 'none';
    emptyMsg.style.display = 'flex';
    updateTotals(0, 0, 0);
    return;
  }

  table.style.display = 'table';
  emptyMsg.style.display = 'none';

  body.innerHTML = cart.map(item => {
    const subtotal = item.price * item.qty;
    return `
      <tr>
        <td>
          <div class="item-name">${item.name}</div>
          <div class="item-code">${item.barcode}</div>
        </td>
        <td>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty('${item.barcode}',-1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty('${item.barcode}',1)">＋</button>
          </div>
        </td>
        <td class="price-cell">¥${item.price.toLocaleString()}</td>
        <td class="price-cell">¥${subtotal.toLocaleString()}</td>
        <td><button class="del-btn" onclick="removeItem('${item.barcode}')">✕</button></td>
      </tr>
    `;
  }).join('');

  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const tax = Math.round(subtotal * 0.1);
  const total = subtotal + tax;
  const count = cart.reduce((s, i) => s + i.qty, 0);
  updateTotals(subtotal, tax, total, count);
  updateChange();
}

function updateTotals(subtotal, tax, total, count = 0) {
  document.getElementById('subtotal').textContent = `¥${subtotal.toLocaleString()}`;
  document.getElementById('tax').textContent = `¥${tax.toLocaleString()}`;
  document.getElementById('total').textContent = `¥${total.toLocaleString()}`;
  document.getElementById('item-count').textContent = `${count}点`;

  const btn = document.getElementById('checkout-btn');
  btn.disabled = total === 0;
}

// ========== NUMPAD ==========
function numpad(val) {
  if (val === 'C') {
    paymentAmount = '';
  } else {
    if (paymentAmount.length >= 8) return;
    paymentAmount += val;
  }
  document.getElementById('payment-input').value =
    paymentAmount ? Number(paymentAmount).toLocaleString() : '';
  updateChange();
}

function updateChange() {
  const total = getTotal();
  const paid = Number(paymentAmount) || 0;
  const change = paid - total;
  const el = document.getElementById('change');
  el.textContent = `¥${Math.max(0, change).toLocaleString()}`;
  el.className = 'change-val' + (change < 0 && paid > 0 ? ' negative' : '');
}

function getTotal() {
  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  return subtotal + Math.round(subtotal * 0.1);
}

// ========== CHECKOUT ==========
function checkout() {
  const total = getTotal();
  if (total === 0) return;
  const paid = Number(paymentAmount) || 0;
  if (paid < total) {
    showToast('お預かり金額が不足しています', 'error');
    return;
  }
  const change = paid - total;

  document.getElementById('ok-total').textContent = `¥${total.toLocaleString()}`;
  document.getElementById('ok-payment').textContent = `¥${paid.toLocaleString()}`;
  document.getElementById('ok-change').textContent = `¥${change.toLocaleString()}`;

  document.getElementById('ok-modal').classList.add('active');
}

function nextCustomer() {
  document.getElementById('ok-modal').classList.remove('active');
  clearAll();
  document.getElementById('barcode-input').focus();
}

// ========== BARCODE INPUT ==========
document.getElementById('barcode-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = e.target.value;
    e.target.value = '';
    addProduct(val);
  }
});

// ========== CAMERA BARCODE ==========
function toggleCamera() {
  if (cameraActive) {
    closeCamera();
  } else {
    openCamera();
  }
}

function openCamera() {
  document.getElementById('camera-modal').classList.add('active');
  document.getElementById('cam-btn').classList.add('active');
  document.getElementById('scan-status').textContent = 'カメラを起動中...';
  document.getElementById('scan-status').className = 'scan-status';

  Quagga.init({
    inputStream: {
      name: 'Live',
      type: 'LiveStream',
      target: document.getElementById('camera-container'),
      constraints: {
        facingMode: 'environment',
        width: { ideal: 1920 },
        height: { ideal: 1080 },
      },
    },
    decoder: {
      // EAN/UPCに絞ることで誤検出を大幅に減らす
      readers: ['ean_reader', 'ean_8_reader', 'upc_reader', 'upc_e_reader'],
      multiple: false,
    },
    locate: true,
    locator: {
      patchSize: 'large',   // largeで精度向上
      halfSample: false,    // 解像度を落とさない
    },
    frequency: 10,          // 毎秒10フレーム処理
  }, err => {
    if (err) {
      document.getElementById('scan-status').textContent =
        '❌ カメラのアクセスに失敗しました: ' + err.message;
      document.getElementById('scan-status').className = 'scan-status';
      console.error(err);
      return;
    }
    Quagga.start();
    cameraActive = true;
    document.getElementById('scan-status').textContent = '📷 バーコードをカメラに向けてください';
  });

  // 同じコードが3フレーム連続で一致したら確定（誤読防止）
  const CONFIRM_COUNT = 3;
  let voteMap = {};
  let confirmed = false;

  Quagga.onDetected(result => {
    if (confirmed) return;

    // 確信度チェック：エラー率が高いフレームは捨てる
    const errors = result.codeResult.decodedCodes
      .filter(c => c.error !== undefined)
      .map(c => c.error);
    if (errors.length > 0) {
      const avgError = errors.reduce((a, b) => a + b, 0) / errors.length;
      if (avgError > 0.20) return; // 誤差20%超は無視
    }

    const code = result.codeResult.code;

    // 数字のみ・8桁/12桁/13桁のEAN・UPC以外は捨てる
    if (!/^\d{8}$|^\d{12}$|^\d{13}$/.test(code)) return;

    voteMap[code] = (voteMap[code] || 0) + 1;
    const count = voteMap[code];
    const progress = Math.min(count, CONFIRM_COUNT);

    document.getElementById('scan-status').textContent =
      `🔍 読み取り中: ${code}  [${'█'.repeat(progress)}${'░'.repeat(CONFIRM_COUNT - progress)}]`;
    document.getElementById('scan-status').className = 'scan-status';

    if (count >= CONFIRM_COUNT) {
      confirmed = true;
      voteMap = {};
      document.getElementById('scan-status').textContent = `✅ 読み取り完了: ${code}`;
      document.getElementById('scan-status').className = 'scan-status detected';

      // 1秒待ってからカメラを閉じて商品追加
      setTimeout(() => {
        closeCamera();
        addProduct(code);
      }, 1000);
    }
  });
}

function closeCamera() {
  if (cameraActive) {
    Quagga.stop();
    cameraActive = false;
  }
  document.getElementById('camera-modal').classList.remove('active');
  document.getElementById('cam-btn').classList.remove('active');
  document.getElementById('scan-status').textContent = 'カメラを起動中...';
}

// ========== TOAST ==========
function showToast(msg, type = '') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

// ========== KEYBOARD SHORTCUT ==========
document.addEventListener('keydown', e => {
  if (e.key === 'F1') { e.preventDefault(); document.getElementById('barcode-input').focus(); }
  if (e.key === 'F2') { e.preventDefault(); toggleCamera(); }
  if (e.key === 'F12') { e.preventDefault(); checkout(); }
  if (e.key === 'Escape') {
    closeCamera();
    document.getElementById('ok-modal').classList.remove('active');
  }
});

// init
renderCart();
document.getElementById('barcode-input').focus();
</script>
</body>
</html>
